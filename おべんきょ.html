<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>ぽ～たる</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        /* フォント */
        font-family: 'HG丸ｺﾞｼｯｸM-PRO', 'HGMaruGothicMPRO', sans-serif;
        /* 背景色   */
        background-color: lightblue;
        /* マウスポインター */
        cursor: url("画_カニ.png"), auto;
        /* リンクの上でも同じカーソルにする */
        a {
          cursor: url("画_カニ.png"), auto;
        }
        /* ホバー時（蛍光ペン） */
        a:hover {
          background-color: yellow;
        }
        p {
          line-height: 1.6;
        }
      }
    </style>
  </head>
  <body style="font-family: 'HG丸ｺﾞｼｯｸM-PRO', 'HGMaruGothicMPRO', sans-serif;"
    style="background-color: lightblue;">
    
    <h1>おべんきょ</h1>
    <p>
		<a href="マナーとか作法とか.html">マナー</a>
		<br><a href="https://www.transport-pf.or.jp/site_map/">のりもの</a>
		<br><a href="はつでん.html">発電</a>
    </p>
	  <script>
		  document.addEventListener("DOMContentLoaded", () => {
			  const links = document.querySelectorAll("a");
			  links.forEach(link => {
				  const url = link.getAttribute("href");
				  
				  // 外部リンクは新しいタブで開く
				  if (url && url.startsWith("http")) {
					  link.target = "_blank";
					  link.rel = "noopener noreferrer";
					  return; // 外部リンクはフェードアウトしない
				  }

				  // 内部リンクだけフェードアウト
				  link.addEventListener("click", e => {
					  if (!url || url.startsWith("#")) return;
					  e.preventDefault();
					  document.body.classList.add("fade-out");
					  setTimeout(() => {
						  window.location = url;
					  }, 500);
				  });
			  });
		  });
	  </script>

  </body>
</html>
