<div class="scene">
  <div class="cube body"></div>

  <div class="cube tail"></div>
</div>

<style>
.scene {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 80px auto;
  transform-style: preserve-3d;
  animation: spin 8s linear infinite;
  transform-origin: 150px 150px;
}

/* ★ 立方体の基本形（6面の箱） */
.cube {
  position: absolute;
  width: 60px;
  height: 60px;
  transform-style: preserve-3d;
}

.cube::before,
.cube::after {
  content: "";
  position: absolute;
  inset: 0;
  background: inherit;
}

/* 6面を作る */
.cube div {
  position: absolute;
  width: 60px;
  height: 60px;
  background: #fff;
  border: 2px solid #ccc;
}

.cube .front  { transform: translateZ(30px); }
.cube .back   { transform: rotateY(180deg) translateZ(30px); }
.cube .left   { transform: rotateY(-90deg) translateZ(30px); }
.cube .right  { transform: rotateY(90deg) translateZ(30px); }
.cube .top    { transform: rotateX(90deg) translateZ(30px); }
.cube .bottom { transform: rotateX(-90deg) translateZ(30px); }

/* ★ ウサギのパーツ配置（全部“立体”） */
.body {
  transform: translate3d(120px, 150px, 0px);
  background: #f5f5f5;
}

.head {
  transform: translate3d(120px, 90px, 20px);
  background: #f5f5f5;
}

.ear-left {
  transform: translate3d(110px, 40px, 20px) scale(1, 1.6);
  background: #f5f5f5;
}

.ear-right {
  transform: translate3d(150px, 40px, 20px) scale(1, 1.6);
  background: #f5f5f5;
}

.tail {
  transform: translate3d(100px, 160px, -20px) scale(0.6);
  background: #f5f5f5;
}

/* 回転アニメーション */
@keyframes spin {
  from { transform: rotateX(20deg) rotateY(0deg); }
  to   { transform: rotateX(20deg) rotateY(360deg); }
}
</style>
