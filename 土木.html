<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>ぽ～たる</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        /* フォント */
        font-family: 'HG丸ｺﾞｼｯｸM-PRO', 'HGMaruGothicMPRO', sans-serif;
        /* 背景色   */
        background-color: lightblue;
        /* マウスポインター */
        cursor: url("画_カニ.png"), auto;
        /* リンクの上でも同じカーソルにする */
        a {
          cursor: url("画_カニ.png"), auto;
        }
        /* ホバー時（蛍光ペン） */
        a:hover {
          background-color: yellow;
        }
        p {
          line-height: 1.6;
        }
      }
    </style>
  </head>
  <body style="font-family: 'HG丸ｺﾞｼｯｸM-PRO', 'HGMaruGothicMPRO', sans-serif;"
    style="background-color: lightblue;">
    
    <h1>土木建築ごみ</h1>
    <h2>土木</h2>
    <p>
      <a href="https://www.youtube.com/@MKPROJECT-DOBOKU/videos">・土木のおしごと【MKプロジェクト】</a>
    </p>
    <h2>ごみ</h2>
    <p>
      <a href="https://www.youtube.com/watch?v=tKNmvtf1ZCk">・産業廃棄物の埋め立て（広島）</a>
    </p>
	  
	  <footer style="margin-top: 50px; color: gray;">
		  <small>
				このサイトは個人制作のリンクポータルです。
				<br>各リンク先の内容・運営はリンク先各団体に帰属します。
		  </small>
	  </footer>
	  <script>
		  document.addEventListener("DOMContentLoaded", () => {
			  const links = document.querySelectorAll("a");
			  links.forEach(link => {
				  const url = link.getAttribute("href");
				  // 外部リンクは新しいタブで開く
				  if (url && url.startsWith("http")) {
					  link.target = "_blank";
					  link.rel = "noopener noreferrer";
					  return; // 外部リンクはフェードアウトしない
				  }
				  // 内部リンクだけフェードアウト
				  link.addEventListener("click", e => {
					  if (!url || url.startsWith("#")) return;
					  e.preventDefault();
					  document.body.classList.add("fade-out");
					  setTimeout(() => {window.location = url;}, 500);
				  });
			  });
		  });
	  </script>
  </body>
</html>
